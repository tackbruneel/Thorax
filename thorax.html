<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thorax">
<meta name="theme-color" content="#0b0b14">
<title>Thorax</title>
<style>
:root{
  --bg:#0b0b14; --bg2:#12121f; --card:#181826; --card2:#1f1f30;
  --line:#2a2a3d; --txt:#f3f3fb; --mut:#9a9ab5; --mut2:#6f6f8c;
  --acc:#8b5cf6; --acc2:#6366f1; --grad:linear-gradient(135deg,#8b5cf6,#6366f1);
  --green:#34d399; --greenbg:rgba(52,211,153,.14);
  --blue:#60a5fa; --bluebg:rgba(96,165,250,.14);
  --amber:#fbbf24; --amberbg:rgba(251,191,36,.14);
  --red:#fb7185;
  --r:18px; --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{padding-bottom:calc(78px + var(--sab))}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:var(--acc)}

/* Header */
header{position:sticky;top:0;z-index:30;padding:calc(var(--sat) + 14px) 18px 12px;
  background:linear-gradient(180deg,rgba(11,11,20,.95),rgba(11,11,20,.78));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:22px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
.dot{width:11px;height:11px;border-radius:50%;background:var(--grad);box-shadow:0 0 14px var(--acc)}
header p{margin:3px 0 0;color:var(--mut);font-size:13px}

main{padding:16px 16px 24px;max-width:560px;margin:0 auto}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
#v-dash,#v-days{padding-bottom:84px}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:14px}
.card h2{margin:0 0 12px;font-size:15px;font-weight:700;letter-spacing:-.2px}
.row{display:flex;gap:12px}
.row>*{flex:1}

/* Stat grid */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px}
.stat .lbl{color:var(--mut);font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.stat .val{font-size:23px;font-weight:800;letter-spacing:-.5px;margin-top:7px}
.stat .sub{color:var(--mut2);font-size:11.5px;margin-top:3px}
.stat.big{grid-column:1/3;background:var(--grad);border:none}
.stat.big .lbl,.stat.big .sub{color:rgba(255,255,255,.85)}
.stat.big .val{font-size:30px;color:#fff}

/* Goal */
.goalwrap{margin-top:4px}
.goalhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.goalhead .g1{font-size:15px;font-weight:700}
.goalhead .g2{color:var(--mut);font-size:13px}
.bar{height:14px;background:var(--bg2);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
.bar>i{display:block;height:100%;background:var(--grad);border-radius:10px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.goalmeta{display:flex;justify-content:space-between;margin-top:10px;gap:10px;flex-wrap:wrap}
.goalmeta span{color:var(--mut);font-size:12.5px}
.goalmeta b{color:var(--txt);font-weight:700}

/* Chart */
.chartwrap{position:relative}
canvas{width:100%;display:block}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px}
.legend div{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--mut)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* Entry list */
.entry{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--card);
  border:1px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.15s}
.entry:active{transform:scale(.985);background:var(--card2)}
.entry .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:18px;flex-shrink:0;font-weight:800}
.entry .mid{flex:1;min-width:0}
.entry .t1{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
.entry .t2{color:var(--mut);font-size:12.5px;margin-top:2px}
.entry .amt{font-weight:800;font-size:16px;text-align:right;white-space:nowrap}
.daygroup{color:var(--mut2);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:18px 2px 9px}
.daygroup:first-child{margin-top:4px}

/* Invoice groups */
.inv{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
.invhead{display:flex;align-items:center;gap:12px;padding:14px}
.invhead .mid{flex:1;min-width:0}
.invhead .nm{font-weight:700;font-size:15.5px}
.invhead .meta{color:var(--mut);font-size:12.5px;margin-top:2px}
.invhead .amt{font-weight:800;font-size:17px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid transparent}
.chip.open{background:var(--amberbg);color:var(--amber);border-color:rgba(251,191,36,.25)}
.chip.sent{background:var(--bluebg);color:var(--blue);border-color:rgba(96,165,250,.25)}
.chip.paid{background:var(--greenbg);color:var(--green);border-color:rgba(52,211,153,.25)}
.invbody{border-top:1px solid var(--line);padding:6px 14px 14px;display:none}
.inv.open .invbody{display:block}
.invline{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.invline:last-child{border:none}
.invline .l{color:var(--mut)}
.invactions{display:flex;gap:9px;margin-top:13px}
.btn{padding:11px 14px;border-radius:12px;font-weight:700;font-size:14px;border:1px solid var(--line);
  background:var(--card2);color:var(--txt);flex:1;text-align:center;transition:.15s}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--grad);border:none;color:#fff}
.btn.g{background:var(--greenbg);color:var(--green);border-color:transparent}
.btn.sm{flex:none;padding:9px 13px;font-size:13px}

/* Monthhead */
.monthhead{display:flex;justify-content:space-between;align-items:center;margin:20px 2px 10px}
.monthhead:first-child{margin-top:2px}
.monthhead .mt{font-size:16px;font-weight:800;text-transform:capitalize}
.monthhead .mv{color:var(--mut);font-size:13px;font-weight:600}

/* Tab bar */
nav{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;
  padding:9px 8px calc(9px + var(--sab));background:rgba(18,18,31,.86);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line)}
nav button{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut2);
  font-size:10.5px;font-weight:600;padding:4px 12px;border-radius:12px;min-width:60px}
nav button svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
nav button.on{color:var(--acc)}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(82px + var(--sab));z-index:35;width:58px;height:58px;border-radius:50%;
  background:var(--grad);color:#fff;display:grid;place-items:center;box-shadow:0 10px 30px rgba(99,102,241,.5);font-size:30px;font-weight:300}
.fab:active{transform:scale(.92)}

/* Sheet */
.scrim{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;
  backdrop-filter:blur(2px)}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--bg2);border-radius:24px 24px 0 0;
  border-top:1px solid var(--line);padding:8px 18px calc(20px + var(--sab));max-height:92vh;overflow-y:auto;
  transform:translateY(102%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-width:560px;margin:0 auto}
.sheet.on{transform:translateY(0)}
.grab{width:40px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.sheet h2{margin:0 0 18px;font-size:20px;font-weight:800;letter-spacing:-.3px}
.field{margin-bottom:15px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:13px 14px;background:var(--card);
  border:1px solid var(--line);border-radius:13px;color:var(--txt);outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.field textarea{resize:none;min-height:54px}
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:4px;gap:4px}
.seg button{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:700;color:var(--mut)}
.seg button.on{background:var(--grad);color:#fff}
.preview{background:var(--grad);border-radius:14px;padding:14px 16px;margin:4px 0 16px;display:flex;justify-content:space-between;align-items:center}
.preview .pl{color:rgba(255,255,255,.85);font-size:13px;font-weight:600}
.preview .pv{color:#fff;font-size:24px;font-weight:800}
.sheetbtns{display:flex;gap:10px;margin-top:6px}
.hide{display:none!important}
.muted{color:var(--mut);font-size:13px;line-height:1.5}
.tinybtn{padding:7px 11px;border-radius:9px;background:var(--card2);border:1px solid var(--line);font-size:13px;font-weight:600;flex:none}
.clientrow{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:9px}
.clientrow .cn{flex:1;font-weight:600}
.cdel{color:var(--red);font-size:13px;font-weight:700;padding:5px 8px}
.empty{text-align:center;padding:46px 20px;color:var(--mut2)}
.empty .e1{font-size:44px;margin-bottom:10px}
.empty .e2{font-size:15px;font-weight:600;color:var(--mut)}
.toast{position:fixed;left:50%;bottom:calc(96px + var(--sab));transform:translateX(-50%) translateY(20px);
  background:var(--txt);color:var(--bg);padding:12px 20px;border-radius:30px;font-weight:700;font-size:14px;z-index:60;
  opacity:0;pointer-events:none;transition:.3s;box-shadow:0 8px 24px rgba(0,0,0,.4);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;background:var(--card2);color:var(--mut)}
</style>
</head>
<body>

<header>
  <h1><span class="dot"></span> Thorax</h1>
  <p id="subtitle">Werkuren, km &amp; facturen</p>
</header>

<main>
  <!-- DASHBOARD -->
  <section class="view on" id="v-dash">
    <div class="stats" id="dashStats"></div>
    <div class="card" id="goalCard"></div>
    <div class="card">
      <h2 id="chartTitle">📈 Inkomsten</h2>
      <div class="chartwrap"><canvas id="chart" height="220"></canvas></div>
      <div class="legend" id="legend"></div>
    </div>
  </section>

  <!-- WERKDAGEN -->
  <section class="view" id="v-days">
    <div id="daysList"></div>
  </section>

  <!-- FACTUREN -->
  <section class="view" id="v-inv">
    <div id="invList"></div>
  </section>

  <!-- INSTELLINGEN -->
  <section class="view" id="v-set">
    <div class="card">
      <h2>💶 Tarieven</h2>
      <div class="row">
        <div class="field" style="margin:0">
          <label>Uurtarief (€)</label>
          <input type="number" inputmode="decimal" id="setHourly" step="0.01">
        </div>
        <div class="field" style="margin:0">
          <label>Km-tarief (€)</label>
          <input type="number" inputmode="decimal" id="setKm" step="0.01">
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🎯 Doel</h2>
      <div class="field"><label>Naam</label><input type="text" id="goalLabel" placeholder="Zomerdoel"></div>
      <div class="field"><label>Bedrag (€)</label><input type="number" inputmode="decimal" id="goalAmount"></div>
      <div class="row">
        <div class="field" style="margin:0"><label>Van</label><input type="date" id="goalStart"></div>
        <div class="field" style="margin:0"><label>Tot</label><input type="date" id="goalEnd"></div>
      </div>
    </div>

    <div class="card">
      <h2>👥 Opdrachtgevers</h2>
      <div id="clientList"></div>
      <div style="display:flex;gap:9px;margin-top:6px">
        <input type="text" id="newClient" placeholder="Nieuwe opdrachtgever" style="flex:1;padding:11px 13px;background:var(--card);border:1px solid var(--line);border-radius:12px;color:var(--txt);outline:none">
        <button class="tinybtn" id="addClient">+ Toevoegen</button>
      </div>
    </div>

    <div class="card">
      <h2>💾 Back-up</h2>
      <p class="muted" style="margin:0 0 13px">Je gegevens staan alleen op deze telefoon. Maak af en toe een back-up.</p>
      <div class="row">
        <button class="btn sm" id="exportBtn" style="flex:1">⬇️ Exporteer</button>
        <button class="btn sm" id="importBtn" style="flex:1">⬆️ Importeer</button>
      </div>
      <input type="file" id="importFile" accept="application/json" class="hide">
      <button class="btn sm" id="wipeBtn" style="width:100%;margin-top:9px;color:var(--red)">🗑️ Alles wissen</button>
    </div>
    <p class="muted" style="text-align:center;margin:8px 0 0">DJ Werk &amp; Facturen · v1</p>
  </section>
</main>

<button class="fab" id="fab" aria-label="Toevoegen">+</button>

<nav>
  <button class="on" data-tab="dash"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z"/></svg>Overzicht</button>
  <button data-tab="days"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Werkdagen</button>
  <button data-tab="inv"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h6"/></svg>Facturen</button>
  <button data-tab="set"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Instellingen</button>
</nav>

<!-- Add/Edit sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h2 id="sheetTitle">Werkdag toevoegen</h2>

  <div class="field">
    <label>Datum</label>
    <input type="date" id="fDate">
  </div>
  <div class="field">
    <label>Voor wie</label>
    <select id="fClient"></select>
  </div>
  <div class="field">
    <label>Type</label>
    <div class="seg" id="fType">
      <button data-t="uren" class="on">Op uren (€/u)</button>
      <button data-t="gig">Vaste prijs</button>
    </div>
  </div>

  <div id="urenFields">
    <div class="row">
      <div class="field"><label>Start</label><input type="time" id="fStart"></div>
      <div class="field"><label>Einde</label><input type="time" id="fEnd"></div>
    </div>
    <div class="field"><label>Pauze (minuten)</label><input type="number" inputmode="numeric" id="fBreak" placeholder="0"></div>
  </div>

  <div id="gigFields" class="hide">
    <div class="field"><label>Bedrag voor de gig (€)</label><input type="number" inputmode="decimal" id="fFee" placeholder="0"></div>
  </div>

  <div class="field"><label>Kilometers gereden</label><input type="number" inputmode="decimal" id="fKm" placeholder="0"></div>
  <div class="field"><label>Notitie (optioneel)</label><textarea id="fNote" placeholder="bv. festival, opbouw podium…"></textarea></div>

  <div class="preview">
    <span class="pl">Te factureren</span>
    <span class="pv" id="fPreview">€ 0,00</span>
  </div>

  <div class="sheetbtns">
    <button class="btn" id="cancelBtn">Annuleren</button>
    <button class="btn pri" id="saveBtn" style="flex:2">Opslaan</button>
  </div>
  <button class="btn sm hide" id="deleteBtn" style="width:100%;margin-top:10px;color:var(--red)">Verwijderen</button>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY='djwerk_v1';
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];

/* ---------- State ---------- */
const DEFAULTS={
  settings:{hourly:26,km:0.42,clients:['Dekasound','La Roy','DJ']},
  entries:[],
  status:{},
  goal:{label:'Zomerdoel',amount:10000,start:'2026-06-01',end:'2026-09-30'}
};
let state=load();
function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r)return Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),r);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

/* ---------- Helpers ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const money=n=>new Intl.NumberFormat('nl-BE',{style:'currency',currency:'EUR'}).format(n||0);
const num=v=>{v=parseFloat((''+v).replace(',','.'));return isNaN(v)?0:v;};
function hoursBetween(s,e){if(!s||!e)return 0;const a=s.split(':').map(Number),b=e.split(':').map(Number);let m=(b[0]*60+b[1])-(a[0]*60+a[1]);if(m<0)m+=1440;return m/60;}
function workedHours(e){return (e.start&&e.end)?hoursBetween(e.start,e.end):num(e.hours);}
function billable(e){return Math.max(0,workedHours(e)-num(e.breakMin)/60);}
function amount(e){const s=state.settings;return e.type==='gig'?(num(e.fee)+num(e.km)*s.km):(billable(e)*s.hourly+num(e.km)*s.km);}
function monthKey(d){return d.slice(0,7);}
function monthName(m){const[y,mo]=m.split('-');return new Date(y,mo-1,1).toLocaleDateString('nl-BE',{month:'long',year:'numeric'});}
function dayName(d){return new Date(d+'T00:00').toLocaleDateString('nl-BE',{weekday:'long',day:'numeric',month:'long'});}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return mm?`${hh}u${String(mm).padStart(2,'0')}`:`${hh}u`;}
const todayStr=()=>new Date().toLocaleDateString('en-CA');
function clientColor(c){const p=['#8b5cf6','#22d3ee','#f472b6','#34d399','#fbbf24','#fb7185','#60a5fa','#a78bfa'];const i=state.settings.clients.indexOf(c);return p[(i<0?(c.length):i)%p.length];}
function statusKey(client,month){return client+'|'+month;}
function getStatus(k){return state.status[k]||'open';}
const STLABEL={open:'Te factureren',sent:'Verstuurd',paid:'Betaald'};

function groups(){
  const m={};
  state.entries.forEach(e=>{const mo=monthKey(e.date),k=statusKey(e.client,mo);
    (m[k]||(m[k]={client:e.client,month:mo,key:k,entries:[],total:0,km:0,hours:0}));
    m[k].entries.push(e);m[k].total+=amount(e);m[k].km+=num(e.km);m[k].hours+=billable(e);});
  return Object.values(m);
}

function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1900);}

/* ---------- Tabs ---------- */
let tab='dash';
function showTab(t){
  tab=t;
  $$('.view').forEach(v=>v.classList.remove('on'));
  $('#v-'+t).classList.add('on');
  $$('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  $('#fab').style.display=(t==='days'||t==='dash')?'grid':'none';
  render();
  window.scrollTo(0,0);
}
$$('nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
$('#fab').onclick=()=>openSheet();

/* ---------- Render ---------- */
function render(){
  if(tab==='dash')renderDash();
  if(tab==='days')renderDays();
  if(tab==='inv')renderInv();
  if(tab==='set')renderSet();
}

function renderDash(){
  const now=todayStr(), thisMonth=now.slice(0,7),thisYear=now.slice(0,4);
  let mTot=0,yTot=0,mH=0,mKm=0;
  state.entries.forEach(e=>{const a=amount(e);if(e.date.slice(0,4)===thisYear)yTot+=a;if(monthKey(e.date)===thisMonth){mTot+=a;mH+=billable(e);mKm+=num(e.km);}});
  let teFac=0,open=0,betaald=0;
  groups().forEach(g=>{const s=getStatus(g.key);if(s==='open')teFac+=g.total;else if(s==='sent')open+=g.total;else betaald+=g.total;});

  $('#dashStats').innerHTML=`
    <div class="stat big"><div class="lbl">Deze maand verdiend</div><div class="val">${money(mTot)}</div><div class="sub">${fmtH(mH)} gewerkt · ${Math.round(mKm)} km</div></div>
    <div class="stat"><div class="lbl">📤 Te factureren</div><div class="val">${money(teFac)}</div><div class="sub">nog niet verstuurd</div></div>
    <div class="stat"><div class="lbl">⏳ Openstaand</div><div class="val">${money(open)}</div><div class="sub">verstuurd, niet betaald</div></div>
    <div class="stat"><div class="lbl">✅ Betaald totaal</div><div class="val">${money(betaald)}</div></div>
    <div class="stat"><div class="lbl">📅 Dit jaar</div><div class="val">${money(yTot)}</div></div>`;

  renderGoal();
  drawChart();
}

function renderGoal(){
  const g=state.goal;
  let prog=0;
  state.entries.forEach(e=>{if(e.date>=g.start&&e.date<=g.end)prog+=amount(e);});
  const pct=g.amount>0?Math.min(100,prog/g.amount*100):0;
  const now=todayStr();
  const end=new Date(g.end+'T00:00'),today=new Date(now+'T00:00');
  const daysLeft=Math.max(0,Math.ceil((end-today)/86400000));
  const remaining=Math.max(0,g.amount-prog);
  const ended=now>g.end;
  $('#goalCard').innerHTML=`
    <div class="goalhead"><div class="g1">🎯 ${g.label||'Doel'}</div><div class="g2">${money(prog)} / ${money(g.amount)}</div></div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="goalmeta">
      <span><b>${pct.toFixed(0)}%</b> behaald</span>
      ${ended?`<span>Periode afgelopen</span>`:`<span><b>${daysLeft}</b> dagen te gaan</span><span><b>${money(remaining)}</b> nodig</span>`}
    </div>`;
}

function drawChart(){
  const cv=$('#chart'),ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||cv.offsetWidth||320,H=220;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);

  // one month: cumulative income per day of the current month
  const now=new Date();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const mStr=now.toLocaleDateString('en-CA').slice(0,7);
  const todayDay=Math.min(now.getDate(),daysInMonth);

  const daily=new Array(daysInMonth+1).fill(0);
  state.entries.forEach(e=>{if(monthKey(e.date)===mStr){const d=parseInt(e.date.slice(8,10),10);if(d>=1&&d<=daysInMonth)daily[d]+=amount(e);}});
  const cum=[];let run=0;for(let d=1;d<=daysInMonth;d++){run+=daily[d];cum.push(run);}
  const total=run, max=Math.max(100,...cum);

  const t=$('#chartTitle');if(t)t.textContent='📈 Inkomsten '+now.toLocaleDateString('nl-BE',{month:'long',year:'numeric'});

  const padL=12,padR=14,padT=24,padB=24;
  const plotW=W-padL-padR,plotH=H-padT-padB,base=padT+plotH;
  const xAt=d=>padL+(daysInMonth>1?(d-1)/(daysInMonth-1):0)*plotW;
  const yAt=v=>padT+plotH-(max>0?v/max:0)*plotH;

  // baseline
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padL,base);ctx.lineTo(W-padR,base);ctx.stroke();

  // area under the line (day 1 -> today)
  ctx.beginPath();ctx.moveTo(xAt(1),yAt(cum[0]));
  for(let d=2;d<=todayDay;d++)ctx.lineTo(xAt(d),yAt(cum[d-1]));
  ctx.lineTo(xAt(todayDay),base);ctx.lineTo(xAt(1),base);ctx.closePath();
  const grad=ctx.createLinearGradient(0,padT,0,base);
  grad.addColorStop(0,'rgba(139,92,246,.40)');grad.addColorStop(1,'rgba(139,92,246,0)');
  ctx.fillStyle=grad;ctx.fill();

  // line
  ctx.beginPath();ctx.moveTo(xAt(1),yAt(cum[0]));
  for(let d=2;d<=todayDay;d++)ctx.lineTo(xAt(d),yAt(cum[d-1]));
  ctx.strokeStyle='#8b5cf6';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();

  // marker at today
  const mx=xAt(todayDay),my=yAt(cum[todayDay-1]);
  ctx.fillStyle='#8b5cf6';ctx.beginPath();ctx.arc(mx,my,5,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mx,my,2.2,0,7);ctx.fill();

  // value label near marker
  if(total>0){
    const right=mx>W-72;ctx.fillStyle='#f3f3fb';ctx.font='700 12.5px -apple-system,sans-serif';
    ctx.textAlign=right?'right':'left';
    let ly=my-11;if(ly<padT+8)ly=my+19;
    ctx.fillText(money(total),right?mx-9:mx+9,ly);
  }

  // x-axis day labels
  ctx.fillStyle='#6f6f8c';ctx.font='600 10.5px -apple-system,sans-serif';ctx.textAlign='center';
  const marks=[1];for(let d=8;d<daysInMonth-2;d+=7)marks.push(d);marks.push(daysInMonth);
  marks.forEach(d=>ctx.fillText(d,xAt(d),H-8));

  $('#legend').innerHTML=total>0
    ?'<div><i style="background:#8b5cf6"></i>Cumulatief verdiend deze maand</div>'
    :'<div style="color:var(--mut2)">Nog geen inkomsten deze maand</div>';
}
function rr(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,0);ctx.arcTo(x,y+h,x,y,0);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

function renderDays(){
  const el=$('#daysList');
  if(!state.entries.length){el.innerHTML=emptyState('🗓️','Nog geen werkdagen','Tik op + om je eerste dag toe te voegen');return;}
  const sorted=[...state.entries].sort((a,b)=>b.date.localeCompare(a.date)||(b.id>a.id?1:-1));
  let html='',lastMonth='';
  sorted.forEach(e=>{
    const mo=monthKey(e.date);
    if(mo!==lastMonth){lastMonth=mo;html+=`<div class="daygroup">${monthName(mo)}</div>`;}
    const isGig=e.type==='gig';
    const sub=isGig?`Gig${e.km?' · '+Math.round(num(e.km))+' km':''}`:`${fmtH(billable(e))}${e.km?' · '+Math.round(num(e.km))+' km':''}`;
    html+=`<div class="entry" data-edit="${e.id}">
      <div class="ic" style="background:${clientColor(e.client)}22;color:${clientColor(e.client)}">${isGig?'🎧':'🔊'}</div>
      <div class="mid">
        <div class="t1">${e.client} <span class="tag">${dayShort(e.date)}</span></div>
        <div class="t2">${sub}${e.note?' · '+escapeHtml(e.note):''}</div>
      </div>
      <div class="amt">${money(amount(e))}</div>
    </div>`;
  });
  el.innerHTML=html;
  $$('[data-edit]').forEach(n=>n.onclick=()=>openSheet(state.entries.find(x=>x.id===n.dataset.edit)));
}
function dayShort(d){return new Date(d+'T00:00').toLocaleDateString('nl-BE',{weekday:'short',day:'numeric'});}

function renderInv(){
  const el=$('#invList');
  const gs=groups();
  if(!gs.length){el.innerHTML=emptyState('📄','Nog geen facturen','Voeg werkdagen toe om facturen te zien');return;}
  // group by month desc, client
  gs.sort((a,b)=>b.month.localeCompare(a.month)||a.client.localeCompare(b.client));
  let html='',lastMonth='';
  // compute month totals
  const monthTotals={};gs.forEach(g=>monthTotals[g.month]=(monthTotals[g.month]||0)+g.total);
  gs.forEach(g=>{
    if(g.month!==lastMonth){lastMonth=g.month;
      html+=`<div class="monthhead"><span class="mt">${monthName(g.month)}</span><span class="mv">${money(monthTotals[g.month])}</span></div>`;}
    const st=getStatus(g.key);
    html+=`<div class="inv" data-key="${g.key}">
      <div class="invhead" data-toggle="${g.key}">
        <div class="ic entry" style="background:${clientColor(g.client)}22;color:${clientColor(g.client)};width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:18px;border:none;padding:0;margin:0">📋</div>
        <div class="mid"><div class="nm">${g.client}</div><div class="meta">${g.entries.length} ${g.entries.length===1?'dag':'dagen'} · ${fmtH(g.hours)} · ${Math.round(g.km)} km</div></div>
        <div style="text-align:right"><div class="amt">${money(g.total)}</div><div style="margin-top:5px"><span class="chip ${st}">${STLABEL[st]}</span></div></div>
      </div>
      <div class="invbody">
        ${[...g.entries].sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<div class="invline"><span class="l">${dayShort(e.date)} · ${e.type==='gig'?'gig':fmtH(billable(e))}${e.km?' · '+Math.round(num(e.km))+'km':''}</span><span>${money(amount(e))}</span></div>`).join('')}
        <div class="invactions">
          <button class="btn ${st==='open'?'pri':''}" data-status="${g.key}">${st==='open'?'📤 Markeer verstuurd':st==='sent'?'✅ Markeer betaald':'↩︎ Terug naar open'}</button>
          <button class="btn sm" data-copy="${g.key}">Kopieer</button>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html;
  $$('[data-toggle]').forEach(n=>n.onclick=()=>n.closest('.inv').classList.toggle('open'));
  $$('[data-status]').forEach(n=>n.onclick=e=>{e.stopPropagation();cycleStatus(n.dataset.status);});
  $$('[data-copy]').forEach(n=>n.onclick=e=>{e.stopPropagation();copyInvoice(n.dataset.copy);});
}

function cycleStatus(k){const cur=getStatus(k);const nx={open:'sent',sent:'paid',paid:'open'}[cur];state.status[k]=nx;save();render();toast(nx==='sent'?'Gemarkeerd als verstuurd':nx==='paid'?'Gemarkeerd als betaald ✅':'Terug naar te factureren');}

function copyInvoice(k){
  const g=groups().find(x=>x.key===k);if(!g)return;
  const s=state.settings;
  let L=[`Factuuroverzicht – ${g.client}`,monthName(g.month),''];
  [...g.entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    if(e.type==='gig'){L.push(`${e.date}  Gig: ${money(num(e.fee))}${e.km?` + ${Math.round(num(e.km))}km (${money(num(e.km)*s.km)})`:''}${e.note?'  – '+e.note:''}`);}
    else{L.push(`${e.date}  ${fmtH(billable(e))} × ${money(s.hourly)} = ${money(billable(e)*s.hourly)}${e.km?` + ${Math.round(num(e.km))}km (${money(num(e.km)*s.km)})`:''}${e.note?'  – '+e.note:''}`);}
  });
  const totH=g.hours;
  L.push('',`Totaal uren: ${fmtH(totH)}`,`Totaal km: ${Math.round(g.km)} (${money(g.km*s.km)})`,`TOTAAL TE FACTUREREN: ${money(g.total)}`);
  const txt=L.join('\n');
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('Overzicht gekopieerd 📋')).catch(()=>fallbackCopy(txt));}
  else fallbackCopy(txt);
}
function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('Overzicht gekopieerd 📋');}catch(e){toast('Kopiëren mislukt');}ta.remove();}

function renderSet(){
  const s=state.settings,g=state.goal;
  $('#setHourly').value=s.hourly;$('#setKm').value=s.km;
  $('#goalLabel').value=g.label;$('#goalAmount').value=g.amount;$('#goalStart').value=g.start;$('#goalEnd').value=g.end;
  $('#clientList').innerHTML=s.clients.map((c,i)=>`<div class="clientrow"><span class="cn">${escapeHtml(c)}</span><button class="cdel" data-delc="${i}">Verwijder</button></div>`).join('');
  $$('[data-delc]').forEach(n=>n.onclick=()=>{const i=+n.dataset.delc;if(state.settings.clients.length<=1){toast('Minstens één nodig');return;}state.settings.clients.splice(i,1);save();renderSet();});
}

function emptyState(e,t,s){return `<div class="empty"><div class="e1">${e}</div><div class="e2">${t}</div><div class="muted" style="margin-top:6px">${s}</div></div>`;}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- Settings bindings ---------- */
$('#setHourly').oninput=e=>{state.settings.hourly=num(e.target.value);save();};
$('#setKm').oninput=e=>{state.settings.km=num(e.target.value);save();};
$('#goalLabel').oninput=e=>{state.goal.label=e.target.value;save();};
$('#goalAmount').oninput=e=>{state.goal.amount=num(e.target.value);save();};
$('#goalStart').onchange=e=>{state.goal.start=e.target.value;save();};
$('#goalEnd').onchange=e=>{state.goal.end=e.target.value;save();};
$('#addClient').onclick=()=>{const v=$('#newClient').value.trim();if(!v)return;if(!state.settings.clients.includes(v))state.settings.clients.push(v);$('#newClient').value='';save();renderSet();};
$('#exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='dj-werk-backup-'+todayStr()+'.json';a.click();URL.revokeObjectURL(u);toast('Back-up gedownload');};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);state=Object.assign(JSON.parse(JSON.stringify(DEFAULTS)),d);save();renderSet();toast('Back-up geïmporteerd ✅');}catch(x){toast('Ongeldig bestand');}};r.readAsText(f);};
$('#wipeBtn').onclick=()=>{if(confirm('Alle gegevens wissen? Dit kan niet ongedaan worden.')){localStorage.removeItem(KEY);state=JSON.parse(JSON.stringify(DEFAULTS));save();renderSet();toast('Alles gewist');}};

/* ---------- Sheet (add/edit) ---------- */
let editId=null,fType='uren';
function openSheet(entry){
  editId=entry?entry.id:null;
  $('#sheetTitle').textContent=entry?'Werkdag bewerken':'Werkdag toevoegen';
  $('#deleteBtn').classList.toggle('hide',!entry);
  // fill client options
  $('#fClient').innerHTML=state.settings.clients.map(c=>`<option>${escapeHtml(c)}</option>`).join('');
  if(entry){
    $('#fDate').value=entry.date;$('#fClient').value=entry.client;
    setType(entry.type||'uren');
    $('#fStart').value=entry.start||'';$('#fEnd').value=entry.end||'';$('#fBreak').value=entry.breakMin||'';
    $('#fFee').value=entry.fee||'';$('#fKm').value=entry.km||'';$('#fNote').value=entry.note||'';
  }else{
    $('#fDate').value=todayStr();$('#fClient').selectedIndex=0;
    setType('uren');
    $('#fStart').value='';$('#fEnd').value='';$('#fBreak').value='';$('#fFee').value='';$('#fKm').value='';$('#fNote').value='';
  }
  updatePreview();
  $('#scrim').classList.add('on');$('#sheet').classList.add('on');
}
function closeSheet(){$('#scrim').classList.remove('on');$('#sheet').classList.remove('on');}
function setType(t){fType=t;$$('#fType button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  $('#urenFields').classList.toggle('hide',t!=='uren');$('#gigFields').classList.toggle('hide',t!=='gig');updatePreview();}
$$('#fType button').forEach(b=>b.onclick=()=>setType(b.dataset.t));
$('#scrim').onclick=closeSheet;
$('#cancelBtn').onclick=closeSheet;

function curEntry(){return{type:fType,start:$('#fStart').value,end:$('#fEnd').value,breakMin:$('#fBreak').value,fee:$('#fFee').value,km:$('#fKm').value};}
function updatePreview(){$('#fPreview').textContent=money(amount(curEntry()));}
['#fStart','#fEnd','#fBreak','#fFee','#fKm'].forEach(s=>$(s).oninput=updatePreview);

$('#saveBtn').onclick=()=>{
  const e={
    id:editId||uid(),date:$('#fDate').value,client:$('#fClient').value,type:fType,
    start:fType==='uren'?$('#fStart').value:'',end:fType==='uren'?$('#fEnd').value:'',
    breakMin:fType==='uren'?num($('#fBreak').value):0,
    fee:fType==='gig'?num($('#fFee').value):0,
    km:num($('#fKm').value),note:$('#fNote').value.trim()
  };
  if(!e.date){toast('Kies een datum');return;}
  if(fType==='uren'&&(!e.start||!e.end)){toast('Vul start- en eindtijd in');return;}
  const wasEdit=!!editId;
  if(editId){const i=state.entries.findIndex(x=>x.id===editId);if(i>=0)state.entries[i]=e;}
  else state.entries.push(e);
  closeSheet();
  save();
  if(tab!=='days'&&tab!=='dash')showTab('days');else render();
  toast(wasEdit?'Bijgewerkt':'Toegevoegd ✅');
};
$('#deleteBtn').onclick=()=>{if(!editId)return;if(confirm('Deze werkdag verwijderen?')){state.entries=state.entries.filter(x=>x.id!==editId);closeSheet();save();render();toast('Verwijderd');}};

/* ---------- PWA icon (generated PNG) ---------- */
function makeIcon(size){
  const c=document.createElement('canvas');c.width=c.height=size;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,size,size);g.addColorStop(0,'#8b5cf6');g.addColorStop(1,'#6366f1');
  x.fillStyle=g;const r=size*0.22;rr(x,0,0,size,size,r);x.fill();
  x.fillStyle='#fff';x.textAlign='center';x.textBaseline='middle';
  x.font=`800 ${size*0.40}px -apple-system,Helvetica,sans-serif`;x.fillText('Tx',size/2,size*0.54);
  return c.toDataURL('image/png');
}
function setupPWA(){
  const i180=makeIcon(180),i192=makeIcon(192),i512=makeIcon(512);
  const l=document.createElement('link');l.rel='apple-touch-icon';l.href=i180;document.head.appendChild(l);
  const mani={name:'Thorax',short_name:'Thorax',start_url:'.',display:'standalone',
    background_color:'#0b0b14',theme_color:'#0b0b14',icons:[
    {src:i192,sizes:'192x192',type:'image/png'},{src:i512,sizes:'512x512',type:'image/png'}]};
  const mb=new Blob([JSON.stringify(mani)],{type:'application/json'});
  const ml=document.createElement('link');ml.rel='manifest';ml.href=URL.createObjectURL(mb);document.head.appendChild(ml);
}

/* ---------- Init ---------- */
window.addEventListener('resize',()=>{if(tab==='dash')drawChart();});
setupPWA();
showTab('dash');
</script>
</body>
